<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio – Florian Atzmüller</title>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f1f1f1;
      color: #222;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 120px;
      height: auto;
    }

    .back-button {
      position: absolute;
      top: 25px;
      right: 25px;
      font-size: 28px;
      color: #333;
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-button:hover {
      color: #666;
    }

    .content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 140px 20px 40px;
    }

    .text-box {
      max-width: 800px;
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      line-height: 1.6;
      margin:auto;
    }

    .text-box h2 {
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .logo {
        width: 80px;
        top: 15px;
        left: 15px;
      }

      .back-button {
        top: 18px;
        right: 18px;
        font-size: 22px;
      }

      .text-box {
        padding: 20px;
      }
    }
      
      .contact-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.contact-form label {
  font-weight: bold;
  font-size: 14px;
}

.contact-form input,
.contact-form textarea {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
}

.contact-form input:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: #888;
}

.contact-form button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 6px;
  background-color: #222;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

.contact-form button:hover {
  background-color: #444;
}
      
  </style>
</head>
<body>
  <img src="logo.png" alt="Logo" class="logo">
  <a href="index.html" class="back-button" title="Zurück zur Startseite">
    <i class="fas fa-arrow-left"></i>
  </a>

  <div class="content">
    <div class="text-box">
      <h1>Kontakt</h1>
<p>Ich freue mich über deine Nachricht bezüglich Unterricht, Kollaboration oder sonstiger Anfragen.</p>

<form action="https://formspree.io/f/mgoljldj" method="POST" class="contact-form">
  
    <input type="hidden" name="_next" value="index.html">
    
  <label for="name">Name</label>
  <input type="text" id="name" name="name" required>

  <label for="email">E-Mail</label>
  <input type="email" id="email" name="email" required>

  <label for="message">Nachricht</label>
  <textarea id="message" name="message" rows="5" required></textarea>

  <button type="submit">Nachricht senden</button>
</form>
    </div>
  </div>
</body>
</html>
