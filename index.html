<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flo's Bass Lessons</title>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #BCBCBC;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-container {
      width: 50vw;
      height: 50vw;
      max-width: 450px;
      max-height: 450px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      opacity: 90%;
    }

    .slice {
      position: absolute;
      width: 100%;
      height: 100%;
      clip-path: polygon(50% 50%, 100% 0, 100% 100%);
      transform-origin: center;
      opacity: 0.5;
      transition: background-color 0.6s, opacity 0.6s;
      z-index: 2;
      cursor: pointer;
    }

    .slice1 {
      background-color: yellow;
      transform: rotate(0deg);
    }

    .slice2 {
      background-color: green;
      transform: rotate(120deg);
    }

    .slice3 {
      background-color: red;
      transform: rotate(240deg);
    }

    .slice:hover {
      opacity: 1;
    }

    .icon-wrapper {
      position: absolute;
      top: 50%;
      left: 75%;
      transform: translate(-50%, -50%);
      z-index: 3;
      pointer-events: none;
    }

    .slice1 .icon-wrapper {
      transform: translate(-50%, -50%) rotate(0deg);
    }

    .slice2 .icon-wrapper {
      transform: translate(-50%, -50%) rotate(-120deg);
    }

    .slice3 .icon-wrapper {
      transform: translate(-50%, -50%) rotate(-240deg);
    }

    .icon {
      font-size: 5.5vw;
      color: black;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .slice:hover .icon {
      opacity: 1;
    }

    .logo-img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      top: 0;
      left: 0;
      z-index: 1;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .logo-container {
        width: 80vw;
        height: 80vw;
      }

      .icon {
        font-size: 5vw;
      }
    }
  </style>

  <script>
    function handleSlice3Click() {
      const password = prompt("Passwort:");
      if (password === "t4k3f1v3") {
        alert("Zugriff gewährt!");
        window.location.href = "materialien.html";
      } else if (password !== null) {
        alert("Falsches Passwort.");
      }
    }
  </script>
</head>
<body>
  <div class="logo-container">
    
    <!-- PORTFOLIO -->
    <a href="portfolio.html" class="slice slice1">
      <div class="icon-wrapper">
        <i class="fas fa-user-tie icon"></i>
      </div>
    </a>
    
    <!-- KONTAKT (jetzt kontakt.html) -->
    <a href="kontakt.html" class="slice slice2">
      <div class="icon-wrapper">
        <i class="fas fa-envelope icon"></i>
      </div>
    </a>
   
    <!-- MATERIALIEN -->
    <div class="slice slice3" onclick="handleSlice3Click()">
      <div class="icon-wrapper">
        <i class="fas fa-music icon"></i>
      </div>
    </div>

    <img src="logo.png" alt="Title" class="logo-img" />
  </div>
</body>
</html>
